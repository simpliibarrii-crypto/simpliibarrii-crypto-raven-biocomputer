services:
  demo:
    build: .
    command: ["python", "app.py"]
    ports:
      - "7860:7860"
    environment:
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 7860
      RAVEN_BIOCOMPUTER_RUNS: /workspace/runs
    volumes:
      - ./runs:/workspace/runs
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]

  worker:
    build: .
    command:
      - raven-biocomputer
      - run
      - sequence_stats
      - --task
      - Container smoke test
      - --payload
      - '{"sequence":"ACGTACGT"}'
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./runs:/workspace/runs
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
