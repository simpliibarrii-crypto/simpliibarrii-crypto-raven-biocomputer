name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python scripts/public_release_check.py
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check raven_biocomputer tests scripts/public_release_check.py
      - run: pytest
      - run: raven-biocomputer run sequence_stats --task "CI smoke test" --payload '{"sequence":"ACGTACGT"}' --run-id ci-smoke
